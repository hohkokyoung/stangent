system_version: 1.0.0

# Add skills that match your project stack. Only listed skills are indexed and
# injected into agents. Available built-in skills:
#   frontend:  react, html-css
#   mobile:    flutter, mobile
#   backend:   fastapi, rest-openapi
#   database:  supabase
#   testing:   playwright, maestro
#   security:  owasp
#
# Example — React + FastAPI:
#   enabled_skills: [react, fastapi, owasp]
#
# Example — Flutter + Supabase:
#   enabled_skills: [flutter, mobile, supabase, owasp, maestro]
enabled_skills: []

embedding:
  provider: voyage-3-lite    # falls back to fastembed if VOYAGE_API_KEY is unset
  fallback: fastembed

gateway:
  deny:
    - "rm -rf"
    - "git clean -fdx"
    - "git push --force"
    - "git push -f"
    - "git reset --hard"
    - "DROP TABLE"
    - "DROP DATABASE"
    - "TRUNCATE"

project_index:
  include: []   # leave empty → auto-detected globs from /agentic-index
                # override example: ["src/**/*.ts", "lib/**/*.dart", "**/*.go"]
  exclude: []   # leave empty → retriever.py built-in defaults apply
                # add entries to suppress specific paths, e.g. ["fixtures/**"]

retrieval:
  default_k: 6
  chunk_tokens: 400
  role_k:
    reviewer: 2   # pattern-matching against skill rules; doesn't need broad context
    tester: 3     # needs test-method chunks, not implementation detail

skill_groups:
  test: [playwright, maestro]   # only these skills are injected into the tester role

plan_id:
  prefix: FEAT   # FEAT-001, FEAT-002, ...
  pad: 3
  start: 1

# Per-role model overrides. Each role uses this model regardless of what model
# is active in your Claude Code session. Set a role to "" to inherit the session default.
# Available model IDs: claude-opus-4-8, claude-sonnet-4-6, claude-haiku-4-5-20251001
models:
  default:     claude-sonnet-4-6           # fallback for any unlisted role
  planner:     claude-sonnet-4-6           # ambiguity resolution + full coverage checklist
  sketcher:    claude-haiku-4-5-20251001   # HTML mockup generation + screenshot
  implementer: claude-sonnet-4-6           # primary coding work
  reviewer:    claude-haiku-4-5-20251001   # mechanical pattern matching against skill rules
  tester:      claude-haiku-4-5-20251001   # run tests, check pass/fail counts
  debugger:    claude-sonnet-4-6           # diagnosis requires reasoning
  refactor:    claude-sonnet-4-6           # codebase understanding + careful edits

# Dynamic complexity routing.
# When enabled, the model selected for each task is adjusted based on its complexity field:
#   complexity: low    → lesser of(role_model, low_cap)  — Haiku ceiling keeps cheap tasks cheap
#   complexity: medium → role_model unchanged             — uses the per-role config above
#   complexity: high   → greater of(role_model, high_floor) — Sonnet floor for demanding tasks
#
# high_floor defaults to Sonnet. Set it to claude-opus-4-8 only for roles that genuinely
# benefit from deeper reasoning (planner, debugger) on architectural/security tasks.
# Avoid Opus for reviewer/tester — they are pattern-matching, not reasoning.
maestro:
  platforms: [android]   # Target platform(s) for Maestro tests: ios | android | [ios, android]
                         # Tester reads this to filter list_devices output before selecting a device.
                         # Override per-task by adding a `platforms:` field in the task frontmatter.

complexity_routing:
  enabled: true
  low_cap: claude-haiku-4-5-20251001    # low tasks never exceed this model
  high_floor: claude-sonnet-4-6         # high tasks use at least this model

git:
  auto_branch: true
  branch_template: "feat/{run_id}"
  base_branch: ""       # empty = branch from current HEAD; set to e.g. "main" to always branch from there
  fail_on_wip: true     # refuse to plan if working tree has uncommitted changes
