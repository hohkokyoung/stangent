system_version: 1.0.0

# Add skills that match your project stack. Only listed skills are indexed and
# injected into agents. Available built-in skills:
#   frontend:  react, html-css
#   mobile:    flutter, mobile
#   backend:   fastapi, rest-openapi
#   database:  supabase
#   testing:   playwright, maestro
#   security:  owasp
#
# Example — React + FastAPI:
#   enabled_skills: [react, fastapi, owasp]
#
# Example — Flutter + Supabase:
#   enabled_skills: [flutter, mobile, supabase, owasp, maestro]
enabled_skills: []

# Project risk profile. Read by the architect and security-reviewer agents to
# calibrate findings and severity — a generic framework can't know your stakes
# unless you declare them. Leave a field empty/[] and those agents will note the
# gap and fall back to conservative generic assumptions rather than inventing
# obligations you never declared.
#   data_sensitivity: what kinds of sensitive data this project handles
#                     — any of: pii, phi, payments, credentials  (empty = none)
#   compliance:       regulatory regimes in scope
#                     — any of: gdpr, ccpa, hipaa, pci, soc2      (empty = none)
#   auth_model:       one line on how tenant/user isolation is enforced
#                     — e.g. "supabase-rls", "app-layer middleware", "single-user"
#   data_residency:   region constraint, or "" for none — e.g. "eu-only"
risk_profile:
  data_sensitivity: []
  compliance: []
  auth_model: ""
  data_residency: ""

embedding:
  provider: voyage-3-lite    # falls back to fastembed if VOYAGE_API_KEY is unset
  fallback: fastembed

gateway:
  # Each entry is matched as a LITERAL substring (case-insensitive) against Bash
  # commands — not a regex. "rm -rf" blocks that exact text; it does not catch
  # "rm -fr" (the hook's built-in rm guard handles flag variants separately).
  deny:
    - "rm -rf"
    - "git clean -fdx"
    - "git push --force"
    - "git push -f"
    - "git reset --hard"
    - "DROP TABLE"
    - "DROP DATABASE"
    - "TRUNCATE"

project_index:
  include: []   # leave empty → auto-detected globs from /agentic-index
                # override example: ["src/**/*.ts", "lib/**/*.dart", "**/*.go"]
  exclude: []   # ADDITIVE — built-in defaults ALWAYS apply (build dirs, vendored
                # deps, and generated code like *.g.dart / *.d.ts / *.pb.* / *.generated.*).
                # Entries here are appended to the defaults, so add only your
                # project-specific extras, e.g. ["fixtures/**", "**/legacy/**"].
                # To re-include something a default excludes, prefix with "!",
                # e.g. ["!tests/**"] to index tests despite the default.
  respect_gitignore: true   # skip any file git ignores (virtualenvs incl.
                # backups/nested, build output, caches, generated artifacts).
                # This is the main junk filter — leave on unless you deliberately
                # need to index gitignored files. Tracked files are always kept.

retrieval:
  default_k: 6
  chunk_tokens: 400
  role_k:
    reviewer: 2   # pattern-matching against skill rules; doesn't need broad context
    tester: 3     # needs test-method chunks, not implementation detail
    architect: 8          # cross-cutting design context — needs breadth
    security-reviewer: 8  # owasp corpus + related-boundary references

skill_groups:
  test: [playwright, maestro]   # only these skills are injected into the tester role

# Sketch design source.
#   html          → classic self-contained HTML mockup, rendered + screenshotted (default)
#   claude-design → sketcher pushes its mockup to a claude.ai/design project so you can
#                   iterate on it visually; your edits are pulled back and re-rendered
#                   before implementation (/agentic-build). Requires the built-in
#                   DesignSync tool (claude.ai login or /design-login).
design:
  source: html            # html | claude-design
  fallback: html          # used when claude-design / DesignSync is unavailable
  project_id: ""          # claude.ai design-system project UUID; set up on first /agentic-plan
  remote_prefix: screens  # remote path prefix inside the design project

plan_id:
  prefix: FEAT   # FEAT-001, FEAT-002, ...
  pad: 3
  start: 1

# Per-role model overrides. Each role uses this model regardless of what model
# is active in your Claude Code session. Set a role to "" to inherit the session default.
# Available model IDs: claude-opus-4-8, claude-sonnet-4-6, claude-haiku-4-5-20251001
models:
  default:     claude-sonnet-4-6           # fallback for any unlisted role
  planner:     claude-sonnet-4-6           # ambiguity resolution + full coverage checklist
  sketcher:    claude-haiku-4-5-20251001   # HTML mockup generation + screenshot
  implementer: claude-sonnet-4-6           # primary coding work
  reviewer:    claude-haiku-4-5-20251001   # mechanical pattern matching against skill rules
  tester:      claude-haiku-4-5-20251001   # run tests, check pass/fail counts
  debugger:    claude-sonnet-4-6           # diagnosis requires reasoning
  refactor:    claude-sonnet-4-6           # codebase understanding + careful edits
  architect:         claude-opus-4-8       # adversarial design reasoning — NOT pattern-matching; worth the spend
  security-reviewer: claude-opus-4-8       # exploit-path construction — NOT pattern-matching; worth the spend

# Dynamic complexity routing.
# When enabled, the model selected for each task is adjusted based on its complexity field:
#   complexity: low    → lesser of(role_model, low_cap)  — Haiku ceiling keeps cheap tasks cheap
#   complexity: medium → role_model unchanged             — uses the per-role config above
#   complexity: high   → greater of(role_model, high_floor) — Sonnet floor for demanding tasks
#
# high_floor defaults to Sonnet. Set it to claude-opus-4-8 only for roles that genuinely
# benefit from deeper reasoning (planner, debugger) on architectural/security tasks.
# Avoid Opus for reviewer/tester — they are pattern-matching, not reasoning.
# The architect and security-reviewer are the opposite: pure reasoning roles that
# construct design critiques and exploit paths. Keep them on Opus — do not "optimize"
# them down to Haiku by analogy with the reviewer; they are not pattern-matchers.
complexity_routing:
  enabled: true
  low_cap: claude-haiku-4-5-20251001    # low tasks never exceed this model
  high_floor: claude-sonnet-4-6         # high tasks use at least this model

# Capability ladder (cheapest → most capable) used by dispatch_plan.py for all
# routing comparisons. Add newer model IDs here in the right position so
# complexity routing ranks them correctly; a model not listed is treated as
# claude-sonnet-4-6 for comparison. Order matters; the exact strings must match
# the IDs used in `models:` above.
model_capability_order:
  - claude-haiku-4-5-20251001
  - claude-sonnet-4-6
  - claude-opus-4-8

git:
  auto_branch: true
  branch_template: "feat/{run_id}"
  base_branch: ""       # empty = branch from current HEAD; set to e.g. "main" to always branch from there
  fail_on_wip: true     # refuse to plan if working tree has uncommitted changes
