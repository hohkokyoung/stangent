system_version: 1.0.0

enabled_skills:
  - fastapi
  - flutter
  - mobile
  - owasp
  - supabase
  - playwright
  - maestro
  - html-css
  - react

# Test framework — set automatically by /agentic-index, or override manually.
# Values: auto | playwright | maestro
# auto = /agentic-index detects from project structure and writes to .claude/state/project.yml
test_framework: auto

embedding:
  provider: voyage-3-lite
  fallback: fastembed

gateway:
  deny:
    - "rm -rf"
    - "git clean -fdx"
    - "git push --force"
    - "git push -f"
    - "git reset --hard"
    - "DROP TABLE"
    - "DROP DATABASE"
    - "TRUNCATE"
    - "supabase db reset"

retrieval:
  default_k: 6
  chunk_tokens: 400

plan_id:
  prefix: FEAT       # plans become FEAT-001, FEAT-002, ...
  pad: 3             # digit count; 3 → 001..999, 4 → 0001..9999
  start: 1           # first number when no existing plans

git:
  auto_branch: true                    # /agentic-plan creates a feature branch
  branch_template: "feat/{run_id}"     # {run_id} → e.g. FEAT-001 → feat/FEAT-001
  base_branch: ""                      # empty = branch from current HEAD; else e.g. "main"
  fail_on_wip: true                    # refuse if working tree has uncommitted changes
